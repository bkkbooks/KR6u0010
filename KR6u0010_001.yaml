body:
  text: 聞如是一時佛在拘夷那竭國如來三月當般泥洹與諸比丘及諸尊菩薩無央數來詣佛所稽首于地眷屬圍繞渴仰聞法世尊寂然默無所説光明不亮賢者阿難長跪叉手白佛言前後説法啓光獨顯今大衆會明更不現何故如此此必有異願聞其意佛默不應如是至三佛告賢者阿難吾般泥洹後五逆濁世魔道興盛魔作比丘壞亂吾道著俗衣裳樂好袈裟五色之服飲酒炙肉殺生貪味無有慈心更相憎嫉時有菩薩辟支羅漢比丘精進修德一切敬待人所宗何教化平等憐貧念老救濟窮厄恆以經像令人奉事作諸功德志性恩善不傷害人損身濟物不自惜已設有是人衆魔比丘咸共憎嫉誹謗揚惡儐出驅遣不令得住自共於後不修道德寺廟空荒無人修理轉就毀壞但貪錢物積聚不散不作功德販賣奴婢耕田墾殖焚燒山林傷害衆生無有慈愍奴為比丘婢為比丘尼無有道德淫姪濁亂男女不別令道薄賤皆由此輩或避縣官依猗吾道求作沙門不修戒律月半月盡卦名講戒厭惓懈怠不欲聽聞抄略前後不肯盡説經不講讀設有讀者不識字句為強言是不咨明者貢高求名噓天雅步以為勞冀望人供養衆魔比丘壽終之後精神當墮無澤地獄五逆罪中無不更歷恆邊沙數罪畢乃出生在邊國無三寶處法欲滅時人女精勤恆作功德男子懈慢不用法語眼見沙門如視糞土無有信心劫欲彌沒諸天泣淚水旱不調五穀不熟疫氣流行死亡者衆人民勤苦縣官䩞剋不順法理皆思樂亂惡人轉多如海中沙劫欲盡故日月短促善者甚少若一若二人命促短四十頭白男子淫姪精盡夭命年壽六十女人壽命七八九十或至百歲大水忽起年至無期世人不信不問豪賤沒溺浮漂魚鱉食噉菩薩辟支阿羅漢比丘衆魔驅遂不豫衆會三乘入山福德之處淡泊自守以為欣快壽命延長諸天衛護月光出世得相遭值共興吾道五楞未化去文
